<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Tangan </title>
  <style>
    /* Reset dan gaya dasar */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(145deg, #1e2a38, #0f1a26);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      width: 100%;
      max-width: none;
      min-height: 100vh;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .video-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .video-row.duo .video-container {
      width: calc(50% - 7.5px);
      min-width: 240px;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 640px; /* lebih pas untuk laptop */
      min-height: 220px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 2px solid rgba(255,255,255,0.18);
      box-shadow: 0 8px 20px rgba(0,0,0,0.45);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    .overlay-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffd700;
      pointer-events: none;
      z-index: 2;
    }

    .hand-guide {
      position: absolute;
      border: 2px dashed #00ff88;
      background: rgba(0,255,136,0.08);
      pointer-events: none;
      z-index: 1;
      transition: all 0.1s ease;
    }

    .hand-cursor {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 3px solid #ffdd57;
      border-radius: 50%;
      background: rgba(255,221,87,0.2);
      pointer-events: none;
      z-index: 3;
      transform: translate(-50%, -50%);
    }

    .hidden {
      display: none;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mode-select {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 20px 0;
    }

    .mode-btn {
      background: #2a3a4e;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #f5af19, #f12711);
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(241,39,17,0.4);
    }

    .mode-btn:hover {
      transform: scale(1.03);
    }

    .game-area {
      margin-top: 20px;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .controls button {
      background: #3a506b;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .controls button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .controls button:not(:disabled):hover {
      background: #4c6b8a;
    }

    .timer {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 10px 0;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 5px 25px;
      border-radius: 30px;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }

    .puzzle-board {
      display: grid;
      gap: 4px;
      margin: 20px auto;
      max-width: 360px;
      background: rgba(0,0,0,0.3);
      padding: 8px;
      border-radius: 20px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .puzzle-tile {
      aspect-ratio: 1;
      background-size: cover;
      background-position: center;
      border-radius: 8px;
      cursor: grab;
      transition: transform 0.15s, opacity 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      position: relative;
    }

    .puzzle-tile:hover {
      transform: scale(1.03);
      z-index: 2;
    }

    .puzzle-tile.empty {
      background: transparent !important;
      cursor: default;
      box-shadow: none;
    }

    .win-message {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #f5af19, #f12711);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .hidden {
      display: none;
    }

    .status-text {
      margin: 10px 0;
      font-size: 1rem;
      opacity: 0.8;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .container { padding: 20px 10px; }
      .mode-btn { padding: 10px 18px; font-size: 0.9rem; }
      .timer { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✋ Puzzle Tangan Viral</h1>

  <!-- Pilih mode -->
  <div class="mode-select">
    <button class="mode-btn active" data-mode="solo">🔵 Main Sendiri</button>
    <button class="mode-btn" data-mode="duo">🔴 Duo (Bersamaan)</button>
  </div>

  <div class="game-area">
    <!-- Kamera -->
    <div class="video-row" id="videoRow">
      <div class="video-container" id="videoWrapper1">
        <video id="video" autoplay playsinline muted></video>
        <div class="hand-guide hidden" id="handGuide"></div>
        <div class="hand-cursor hidden" id="handCursor"></div>
        <div class="overlay-text" id="overlayText">Tunjukkan 2 tangan dengan telunjuk terbuka</div>
      </div>
      <div class="video-container hidden" id="videoWrapper2">
        <video id="video2" autoplay playsinline muted></video>
        <div class="overlay-text" id="overlayText2">Pemain 2</div>
      </div>
    </div>

    <!-- Timer & status -->
    <div class="timer" id="timerDisplay">⏱ 00:30</div>
    <div class="status-text" id="statusText">Arahkan tangan ke kamera</div>

    <!-- Tombol -->
    <div class="controls">
      <button id="startBtn">📷 Mulai Kamera</button>
      <button id="captureBtn" disabled>✋ Ambil Gambar</button>
      <button id="shuffleBtn" disabled>🔀 Acak Puzzle</button>
      <button id="resetBtn" disabled>🔄 Reset</button>
    </div>

    <!-- Papan puzzle -->
    <div class="puzzle-board" id="puzzleBoard"></div>
    <div id="winMessage" class="win-message hidden">🎉 SELAMAT! 🎉</div>
  </div>
</div>

<!-- MediaPipe Hands CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
  (function() {
    // --- Elemen DOM ---
    const video = document.getElementById('video');
    const video2 = document.getElementById('video2');
    const videoRow = document.getElementById('videoRow');
    const videoWrapper2 = document.getElementById('videoWrapper2');
    const handGuide = document.getElementById('handGuide');
    const handCursor = document.getElementById('handCursor');
    const overlayText = document.getElementById('overlayText');
    const overlayText2 = document.getElementById('overlayText2');
    const timerDisplay = document.getElementById('timerDisplay');
    const statusText = document.getElementById('statusText');
    const puzzleBoard = document.getElementById('puzzleBoard');
    const winMessage = document.getElementById('winMessage');

    const startBtn = document.getElementById('startBtn');
    const captureBtn = document.getElementById('captureBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetBtn = document.getElementById('resetBtn');

    const modeBtns = document.querySelectorAll('.mode-btn');

    // --- State ---
    let currentMode = 'solo'; // 'solo' atau 'duo'
    let camera = null;
    let hands = null;
    let handDetected = false;
    let twoHandsDetected = false;
    let validTwoHands = false;
    let lastHandBox = null;
    let lastHandBoxSmoothed = null;
    const SMOOTH_ALPHA = 0.18; // smoothing kecil -> stabilitas
    const MIN_FINGER_DIST_RATIO = 0.14; // threshold relatif terhadap min(width,height)
    const BOX_SIZE_MIN_RATIO = 0.36;
    const BOX_SIZE_MAX_RATIO = 0.95;
    let capturedImageData = null; // ImageData dari snapshot
    let puzzlePieces = [];       // array { id, currentIndex, correctIndex }
    let gridSize = 3;           // 3x3 puzzle
    let emptyIndex = 8;         // index 8 adalah kosong (bottom-right)
    let isPlaying = false;      // sedang bermain puzzle?
    let timerInterval = null;
    let elapsedTime = 0;        // detik berjalan
    let gestureActive = false;
    let gestureCooldown = false;
    const GESTURE_COOLDOWN = 600;

    // --- Helpers ---
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = `⏱ ${formatTime(elapsedTime)}`;
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      stopTimer();
      elapsedTime = 0;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        elapsedTime++;
        updateTimerDisplay();
      }, 1000);
    }

    function setControlsEnabled(enabled) {
      captureBtn.disabled = !enabled;
      shuffleBtn.disabled = !enabled;
      resetBtn.disabled = !enabled;
    }

    // --- MediePipe Hands Setup ---
    function initHands() {
      hands = new Hands({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.6
      });

      hands.onResults(onHandResults);
    }

    // Callback hasil deteksi tangan
    // timing / stability for single-hand sizing
    let boxStableSince = 0;
    const STABLE_TIME_MS = 700;
    const SIZE_STABLE_PX = 8;

    function onHandResults(results) {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const handCount = results.multiHandLandmarks.length;
        if (!handDetected) handDetected = true;

        // TWO HANDS MODE (legacy capture)
        if (handCount >= 2) {
          twoHandsDetected = true;
          const box = getHandCropBox(results.multiHandLandmarks, video.videoWidth, video.videoHeight);
          validTwoHands = !!box;
          lastHandBox = box;

          if (validTwoHands) {
            overlayText.textContent = '✅ 2 tangan siap! Jarak telunjuk sudah pas.';
            overlayText.style.color = '#00ff88';
            handGuide.classList.remove('hidden');
            handGuide.style.left = `${box.x}px`;
            handGuide.style.top = `${box.y}px`;
            handGuide.style.width = `${box.size}px`;
            handGuide.style.height = `${box.size}px`;
            captureBtn.disabled = false;
            statusText.textContent = 'Klik "Ambil Gambar" atau tahan gesture untuk auto-capture.';
          } else {
            overlayText.textContent = '📏 Jaga jarak antar telunjuk kedua tangan.';
            overlayText.style.color = '#ffd700';
            handGuide.classList.add('hidden');
            captureBtn.disabled = true;
            statusText.textContent = 'Atur kedua tangan agar jaraknya cukup lebar.';
          }
        } else {
          // SINGLE HAND MODE: position box with index finger and size using thumb-index distance
          twoHandsDetected = false;
          validTwoHands = false;
          const lm = results.multiHandLandmarks[0];
          const indexTip = lm[8];
          const thumbTip = lm[4] || indexTip;
          const ix = indexTip.x * video.videoWidth;
          const iy = indexTip.y * video.videoHeight;
          const tx = thumbTip.x * video.videoWidth;
          const ty = thumbTip.y * video.videoHeight;
          const fingerDist = Math.hypot(tx - ix, ty - iy);

          // Size controlled by distance (plus a base)
          const base = Math.min(video.videoWidth, video.videoHeight) * 0.28;
          const size = Math.round(Math.min(Math.max(base + fingerDist * 1.8, Math.min(video.videoWidth, video.videoHeight) * BOX_SIZE_MIN_RATIO), Math.min(video.videoWidth, video.videoHeight) * BOX_SIZE_MAX_RATIO));
          const centerX = ix;
          const centerY = iy - size * 0.06; // slightly above index
          const half = Math.round(size / 2);
          let bx = Math.max(0, Math.min(Math.round(centerX - half), video.videoWidth - size));
          let by = Math.max(0, Math.min(Math.round(centerY - half), video.videoHeight - size));
          const rawBox = { x: bx, y: by, size };

          // smooth
          if (!lastHandBoxSmoothed) lastHandBoxSmoothed = rawBox;
          lastHandBoxSmoothed = {
            x: Math.round(lastHandBoxSmoothed.x * (1 - SMOOTH_ALPHA) + rawBox.x * SMOOTH_ALPHA),
            y: Math.round(lastHandBoxSmoothed.y * (1 - SMOOTH_ALPHA) + rawBox.y * SMOOTH_ALPHA),
            size: Math.round(lastHandBoxSmoothed.size * (1 - SMOOTH_ALPHA) + rawBox.size * SMOOTH_ALPHA)
          };

          // show guide
          handGuide.classList.remove('hidden');
          handGuide.style.left = `${lastHandBoxSmoothed.x}px`;
          handGuide.style.top = `${lastHandBoxSmoothed.y}px`;
          handGuide.style.width = `${lastHandBoxSmoothed.size}px`;
          handGuide.style.height = `${lastHandBoxSmoothed.size}px`;
          overlayText.textContent = 'Arahkan telunjuk untuk posisi kotak, buka/jepit ibu jari untuk atur ukuran. Tahan stabil untuk auto-capture.';
          overlayText.style.color = '#ffd700';

          // detect stability in size for auto-capture
          const now = Date.now();
          if (!boxStableSince) boxStableSince = now;
          const lastSize = lastHandBoxSmoothed.size;
          if (!window._prevStableSize) window._prevStableSize = lastSize;
          const delta = Math.abs(window._prevStableSize - lastSize);
          if (delta <= SIZE_STABLE_PX) {
            // stable
            if (now - boxStableSince >= STABLE_TIME_MS) {
              // auto capture
              boxStableSince = 0;
              window._prevStableSize = lastSize;
              autoCaptureFromBox(lastHandBoxSmoothed);
            }
          } else {
            boxStableSince = now;
            window._prevStableSize = lastSize;
          }

          // cursor & gesture for play
          if (isPlaying && puzzlePieces.length > 0) {
            updateHandCursor(lm);
          } else {
            handCursor.classList.add('hidden');
          }
        }
      } else {
        if (handDetected || twoHandsDetected) {
          handDetected = false;
          twoHandsDetected = false;
          validTwoHands = false;
          lastHandBox = null;
          handGuide.classList.add('hidden');
          overlayText.textContent = 'Tunjukkan 2 tangan dengan telunjuk terbuka';
          overlayText.style.color = '#ffd700';
          captureBtn.disabled = true;
          statusText.textContent = 'Gerakkan tangan ke kamera.';
          handCursor.classList.add('hidden');
          boxStableSince = 0;
        }
      }
    }

    function getHandCropBox(landmarksArray, videoWidth, videoHeight) {
      if (landmarksArray.length < 2 || videoWidth === 0 || videoHeight === 0) return null;
      // Cari dua telunjuk terbaik: gunakan index tip landmark (8) dari dua tangan
      const tipPoints = [];
      for (let i = 0; i < landmarksArray.length; i++) {
        const lm = landmarksArray[i][8];
        if (!lm) continue;
        tipPoints.push({ x: lm.x * videoWidth, y: lm.y * videoHeight });
      }
      if (tipPoints.length < 2) return null;
      // Pilih dua yang paling berjauhan (menghindari deteksi dua landmark dari satu tangan)
      let bestA = 0, bestB = 1, bestD = 0;
      for (let a = 0; a < tipPoints.length; a++) {
        for (let b = a + 1; b < tipPoints.length; b++) {
          const dx = tipPoints[a].x - tipPoints[b].x;
          const dy = tipPoints[a].y - tipPoints[b].y;
          const d = Math.hypot(dx, dy);
          if (d > bestD) { bestD = d; bestA = a; bestB = b; }
        }
      }
      const p1 = tipPoints[bestA];
      const p2 = tipPoints[bestB];
      const centerX = (p1.x + p2.x) / 2;
      const centerY = (p1.y + p2.y) / 2;
      const fingerDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);

      const minDist = Math.min(videoWidth, videoHeight) * MIN_FINGER_DIST_RATIO;
      if (fingerDist < minDist) return null;

      // Ukuran kotak berdasarkan jarak jari, dibatasi oleh rasio min/max
      const rawSize = Math.min(Math.max(fingerDist * 2.1, Math.min(videoWidth, videoHeight) * BOX_SIZE_MIN_RATIO), Math.min(videoWidth, videoHeight) * BOX_SIZE_MAX_RATIO);

      const halfSize = rawSize / 2;
      let x = Math.round(centerX - halfSize);
      let y = Math.round(centerY - halfSize);
      x = Math.max(0, Math.min(x, videoWidth - rawSize));
      y = Math.max(0, Math.min(y, videoHeight - rawSize));

      const rawBox = { x, y, size: Math.round(rawSize) };

      // Smooth perubahan kotak agar tidak melompat
      if (!lastHandBoxSmoothed) lastHandBoxSmoothed = rawBox;
      lastHandBoxSmoothed = {
        x: Math.round(lastHandBoxSmoothed.x * (1 - SMOOTH_ALPHA) + rawBox.x * SMOOTH_ALPHA),
        y: Math.round(lastHandBoxSmoothed.y * (1 - SMOOTH_ALPHA) + rawBox.y * SMOOTH_ALPHA),
        size: Math.round(lastHandBoxSmoothed.size * (1 - SMOOTH_ALPHA) + rawBox.size * SMOOTH_ALPHA)
      };

      return lastHandBoxSmoothed;
    }

    function distance2D(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function updateHandCursor(handLandmarks) {
      if (!handCursor || !handLandmarks) return;
      const indexTip = handLandmarks[8];
      const thumbTip = handLandmarks[4];
      const videoRect = video.getBoundingClientRect();
      const cursorX = indexTip.x * videoRect.width;
      const cursorY = indexTip.y * videoRect.height;
      handCursor.style.left = `${cursorX}px`;
      handCursor.style.top = `${cursorY}px`;
      handCursor.classList.remove('hidden');

      const pinchValue = distance2D(indexTip, thumbTip);
      if (pinchValue < 0.05 && !gestureActive && !gestureCooldown) {
        gestureActive = true;
        gestureCooldown = true;
        tryMoveTileWithHand(indexTip);
        setTimeout(() => {
          gestureCooldown = false;
        }, GESTURE_COOLDOWN);
      }
      if (pinchValue >= 0.05) {
        gestureActive = false;
      }
    }

    function tryMoveTileWithHand(indexTip) {
      const boardRect = puzzleBoard.getBoundingClientRect();
      if (!boardRect.width || !boardRect.height) return;
      const relativeX = indexTip.x * boardRect.width;
      const relativeY = indexTip.y * boardRect.height;
      const tileWidth = boardRect.width / gridSize;
      const tileHeight = boardRect.height / gridSize;
      const col = Math.floor(relativeX / tileWidth);
      const row = Math.floor(relativeY / tileHeight);
      if (col < 0 || col >= gridSize || row < 0 || row >= gridSize) return;
      const tileIndex = row * gridSize + col;
      moveTileIfAdjacent(tileIndex);
    }

    function moveTileIfAdjacent(tileIndex) {
      const emptyPiece = puzzlePieces.find(p => p.isEmpty);
      if (!emptyPiece) return;
      const selectedPiece = puzzlePieces.find(p => p.currentIndex === tileIndex);
      if (!selectedPiece || selectedPiece.isEmpty) return;
      const emptyRow = Math.floor(emptyPiece.currentIndex / gridSize);
      const emptyCol = emptyPiece.currentIndex % gridSize;
      const selRow = Math.floor(selectedPiece.currentIndex / gridSize);
      const selCol = selectedPiece.currentIndex % gridSize;
      const isAdjacent = (Math.abs(emptyRow - selRow) + Math.abs(emptyCol - selCol)) === 1;
      if (!isAdjacent) return;
      const tempIndex = selectedPiece.currentIndex;
      selectedPiece.currentIndex = emptyPiece.currentIndex;
      emptyPiece.currentIndex = tempIndex;
      renderPuzzleBoard();
      checkWin();
    }

    // --- Kamera ---
    async function startCamera() {
      if (camera) {
        await camera.stop();
      }
      // Gunakan MediaPipe Camera, pilih kamera depan/laptop jika tersedia
      camera = new Camera(video, {
        onFrame: async () => {
          if (hands) {
            await hands.send({ image: video });
          }
        },
        width: 1280,
          height: 480,
        facingMode: 'user'
      });
      await camera.start();

      if (video.srcObject && video2) {
        video2.srcObject = video.srcObject;
        try {
          await video2.play();
        } catch (err) {
          // Jika autoplay dibatasi, tetap gunakan video utama.
        }
      }

      statusText.textContent = 'Kamera menyala. Tunjukkan tangan...';
      setControlsEnabled(false);
      captureBtn.disabled = true;
      handDetected = false;
      overlayText.textContent = 'Tunjukkan 2 telunjuk, buka sedikit ke samping agar terdeteksi.';
      overlayText.style.color = '#ffd700';

      if (currentMode === 'duo') {
        videoWrapper2.classList.remove('hidden');
        videoRow.classList.add('duo');
      } else {
        videoWrapper2.classList.add('hidden');
        videoRow.classList.remove('duo');
      }
    }

    // --- Ambil Snapshot ---
    function captureSnapshot(boxArg) {
      // boxArg: {x,y,size} in video pixels. If not provided, try two-hands box.
      const box = boxArg || lastHandBox || lastHandBoxSmoothed;
      if (!box) {
        statusText.textContent = '❌ Tidak ada area capture yang valid.';
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = box.size;
      canvas.height = box.size;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, box.x, box.y, box.size, box.size, 0, 0, box.size, box.size);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      capturedImageData = imageData;

      statusText.textContent = '✅ Gambar diambil! Membuat puzzle...';
      setControlsEnabled(true);
      shuffleBtn.disabled = false;
      captureBtn.disabled = true; // jangan capture lagi sebelum diacak
      handGuide.classList.add('hidden');
      renderOriginalPuzzle(imageData);
      // langsung acak agar jadi puzzle tanpa perlu klik
      setTimeout(() => {
        shufflePuzzle();
      }, 250);
    }

    // Debounce auto-capture to avoid multiple triggers
    let _autoCaptureTimeout = null;
    function autoCaptureFromBox(box) {
      if (_autoCaptureTimeout) return;
      _autoCaptureTimeout = setTimeout(() => {
        _autoCaptureTimeout = null;
        captureSnapshot(box);
      }, 150);
    }

    // --- Render puzzle awal (tersusun rapi) ---
    function renderOriginalPuzzle(imageData) {
      const totalTiles = gridSize * gridSize;
      const tileW = Math.floor(imageData.width / gridSize);
      const tileH = Math.floor(imageData.height / gridSize);

      puzzleBoard.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      puzzleBoard.innerHTML = '';

      puzzlePieces = [];
      for (let i = 0; i < totalTiles; i++) {
        const row = Math.floor(i / gridSize);
        const col = i % gridSize;
        const sx = col * tileW;
        const sy = row * tileH;

        // Buat canvas tiap tile
        const tileCanvas = document.createElement('canvas');
        tileCanvas.width = tileW;
        tileCanvas.height = tileH;
        const tileCtx = tileCanvas.getContext('2d');
        tileCtx.putImageData(imageData, sx, sy, sx, sy, tileW, tileH);
        // crop
        const tileData = tileCtx.getImageData(0, 0, tileW, tileH);
        const url = canvasToDataURL(tileCanvas);

        const piece = {
          id: i,
          correctIndex: i,
          currentIndex: i,
          imageUrl: url,
          isEmpty: (i === emptyIndex) // tile terakhir (index 8 untuk 3x3) adalah kosong
        };
        puzzlePieces.push(piece);
      }

      // Render urut
      renderPuzzleBoard();
    }

    function canvasToDataURL(canvas) {
      return canvas.toDataURL('image/jpeg', 0.8);
    }

    // --- Render puzzle board berdasarkan puzzlePieces ---
    function renderPuzzleBoard() {
      puzzleBoard.innerHTML = '';
      // Urutkan berdasarkan currentIndex
      const sorted = [...puzzlePieces].sort((a, b) => a.currentIndex - b.currentIndex);
      sorted.forEach((piece, idx) => {
        const tile = document.createElement('div');
        tile.className = 'puzzle-tile';
        if (piece.isEmpty) {
          tile.classList.add('empty');
        } else {
          tile.style.backgroundImage = `url(${piece.imageUrl})`;
          tile.dataset.pieceId = piece.id;
          tile.draggable = true;
          // Event drag & drop
          tile.addEventListener('dragstart', onDragStart);
          tile.addEventListener('dragover', onDragOver);
          tile.addEventListener('drop', onDrop);
          tile.addEventListener('dragend', onDragEnd);
        }
        puzzleBoard.appendChild(tile);
      });
    }

    // --- Drag & Drop ---
    let draggedPieceId = null;

    function onDragStart(e) {
      draggedPieceId = e.target.dataset.pieceId;
      e.dataTransfer.effectAllowed = 'move';
      e.target.style.opacity = '0.5';
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDrop(e) {
      e.preventDefault();
      const targetTile = e.target.closest('.puzzle-tile');
      if (!targetTile || targetTile.classList.contains('empty')) return;
      const targetPieceId = targetTile.dataset.pieceId;
      if (!draggedPieceId || !targetPieceId) return;
      if (draggedPieceId === targetPieceId) return;

      // Tukar posisi hanya jika salah satu adalah empty (atau bebas? Untuk puzzle geser, hanya bisa dengan empty)
      // Aturan geser: hanya tile yang bersebelahan dengan empty bisa dipindah.
      const draggedPiece = puzzlePieces.find(p => p.id == draggedPieceId);
      const targetPiece = puzzlePieces.find(p => p.id == targetPieceId);
      if (!draggedPiece || !targetPiece) return;

      // Cek apakah target atau dragged bersebelahan dengan empty? Untuk puzzle geser klasik, hanya tile yang berdekatan dengan empty bisa digerakkan.
      // Kita ambil posisi empty
      const emptyPiece = puzzlePieces.find(p => p.isEmpty);
      if (!emptyPiece) return;

      const emptyIdx = emptyPiece.currentIndex;
      const draggedIdx = draggedPiece.currentIndex;
      const targetIdx = targetPiece.currentIndex;

      // Apakah dragged berdekatan dengan empty? (dalam grid)
      const emptyRow = Math.floor(emptyIdx / gridSize);
      const emptyCol = emptyIdx % gridSize;
      const draggedRow = Math.floor(draggedIdx / gridSize);
      const draggedCol = draggedIdx % gridSize;
      const targetRow = Math.floor(targetIdx / gridSize);
      const targetCol = targetIdx % gridSize;

      const isAdjacent = (r1, c1, r2, c2) => {
        return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
      };

      // Hanya bisa memindahkan tile yang bersebelahan dengan empty
      if (!isAdjacent(emptyRow, emptyCol, draggedRow, draggedCol) && !isAdjacent(emptyRow, emptyCol, targetRow, targetCol)) {
        statusText.textContent = '❌ Hanya tile yang bersebelahan dengan kosong!';
        e.target.style.opacity = '1';
        return;
      }

      // Tentukan mana yang akan ditukar dengan empty: seharusnya tile yang digerakkan ke arah empty
      // Agar lebih intuitif: jika dragged yang di-drag ke atas empty, maka dragged bertukar dengan empty.
      // Atau jika target adalah empty? Kita atur: tile yang di-drag (dragged) bertukar dengan empty.
      // Tapi karena kita drop di target, kita perlu logika: jika target adalah empty, tukar dragged dengan empty. Jika tidak, abaikan.
      // Biar sederhana: hanya perbolehkan drop ke empty tile. Jadi target harus empty.
      if (!targetPiece.isEmpty) {
        statusText.textContent = '❌ Letakkan di tile kosong!';
        e.target.style.opacity = '1';
        return;
      }

      // Tukar posisi dragged dengan empty
      const tempIndex = draggedPiece.currentIndex;
      draggedPiece.currentIndex = emptyPiece.currentIndex;
      emptyPiece.currentIndex = tempIndex;

      // Render ulang
      renderPuzzleBoard();
      checkWin();
    }

    function onDragEnd(e) {
      e.target.style.opacity = '1';
      draggedPieceId = null;
    }

    // --- Cek kemenangan ---
    function checkWin() {
      const isSolved = puzzlePieces.every(p => p.currentIndex === p.correctIndex);
      if (isSolved && isPlaying) {
        stopTimer();
        winMessage.classList.remove('hidden');
        statusText.textContent = '🎉 Selamat! Kamu berhasil!';
        setControlsEnabled(false);
        isPlaying = false;
        // Efek spesial (opsional)
      }
    }

    // --- Acak puzzle ---
    function shufflePuzzle() {
      if (!capturedImageData) {
        statusText.textContent = 'Ambil gambar dulu!';
        return;
      }

      // Reset ke posisi awal dulu (terurut)
      puzzlePieces.forEach((p, i) => {
        p.currentIndex = i;
        p.isEmpty = (i === emptyIndex);
      });

      // Lakukan acakan dengan jumlah langkah acak (hanya gerakan valid)
      const totalTiles = gridSize * gridSize;
      const emptyPiece = puzzlePieces.find(p => p.isEmpty);
      let emptyIdx = emptyPiece.currentIndex;
      const steps = 50 + Math.floor(Math.random() * 30);
      for (let s = 0; s < steps; s++) {
        const row = Math.floor(emptyIdx / gridSize);
        const col = emptyIdx % gridSize;
        const neighbors = [];
        if (row > 0) neighbors.push(emptyIdx - gridSize);
        if (row < gridSize - 1) neighbors.push(emptyIdx + gridSize);
        if (col > 0) neighbors.push(emptyIdx - 1);
        if (col < gridSize - 1) neighbors.push(emptyIdx + 1);
        const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
        // Tukar empty dengan neighbor
        const neighborPiece = puzzlePieces.find(p => p.currentIndex === randomNeighbor);
        if (neighborPiece) {
          neighborPiece.currentIndex = emptyIdx;
          emptyPiece.currentIndex = randomNeighbor;
          emptyIdx = randomNeighbor;
        }
      }

      // Pastikan tidak langsung solved (sangat kecil kemungkinan)
      renderPuzzleBoard();
      winMessage.classList.add('hidden');
      isPlaying = true;
      setControlsEnabled(true);
      captureBtn.disabled = true; // tidak perlu capture lagi
      shuffleBtn.disabled = false;
      resetBtn.disabled = false;
      statusText.textContent = '🧩 Puzzle diacak! Susun dengan tangan atau drag.';
      startTimer();
    }

    // --- Reset ---
    function resetGame() {
      stopTimer();
      isPlaying = false;
      winMessage.classList.add('hidden');
      setControlsEnabled(false);
      captureBtn.disabled = true;
      shuffleBtn.disabled = true;
      resetBtn.disabled = false; // reset tetap bisa
      puzzleBoard.innerHTML = '';
      capturedImageData = null;
      puzzlePieces = [];
      elapsedTime = 0;
      updateTimerDisplay();
      statusText.textContent = 'Game direset. Tunjukkan tangan dan ambil gambar.';
      handDetected = false;
      gestureActive = false;
      gestureCooldown = false;
      overlayText.textContent = 'Tunjukkan tangan terbuka';
      overlayText.style.color = '#ffd700';
      handCursor.classList.add('hidden');
      if (currentMode !== 'duo') {
        videoWrapper2.classList.add('hidden');
        videoRow.classList.remove('duo');
      }
      // Mulai ulang deteksi
      if (camera) {
        // already running
      }
    }

    // --- Mode switch ---
    function setMode(mode) {
      currentMode = mode;
      modeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      // Reset game saat ganti mode
      resetGame();
      if (currentMode === 'duo') {
        statusText.textContent = 'Mode Duo: Pemain 1 dan Pemain 2 bersamaan.';
        videoWrapper2.classList.remove('hidden');
        videoRow.classList.add('duo');
      } else {
        statusText.textContent = 'Mode Solo: Tunjukkan tangan!';
        videoWrapper2.classList.add('hidden');
        videoRow.classList.remove('duo');
      }
    }

    // --- Initial setup ---
    function init() {
      initHands();

      // Event listeners
      startBtn.addEventListener('click', async () => {
        await startCamera();
        startBtn.disabled = true;
        startBtn.textContent = '📷 Kamera Aktif';
        setControlsEnabled(false);
        captureBtn.disabled = true;
        shuffleBtn.disabled = true;
        resetBtn.disabled = false;
      });

      captureBtn.addEventListener('click', captureSnapshot);

      shuffleBtn.addEventListener('click', shufflePuzzle);

      resetBtn.addEventListener('click', resetGame);

      modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          setMode(btn.dataset.mode);
        });
      });

      // Inisialisasi timer display
      updateTimerDisplay();
      setControlsEnabled(false);
      resetBtn.disabled = false; // reset selalu bisa
    }

    // Jalankan saat halaman siap
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
